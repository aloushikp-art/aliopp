<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <rect width="500" height="600" fill="white"/>

  <!-- Outer dark olive ellipse -->
  <ellipse cx="250" cy="220" rx="155" ry="185" fill="#4a6741"/>

  <!-- Inner white ellipse cutout (creates the ring) -->
  <ellipse cx="250" cy="220" rx="118" ry="148" fill="white"/>

  <!-- Steam swirl - flowing S-curve (left) -->
  <path d="M 195 270
           C 160 240, 165 200, 200 175
           C 235 150, 240 115, 210 88
           C 240 108, 235 148, 200 173
           C 165 198, 160 238, 195 268 Z"
        fill="#4a6741"/>

  <!-- Steam swirl - flowing S-curve (right/main) -->
  <path d="M 230 265
           C 195 230, 198 185, 238 158
           C 278 131, 282 88, 255 58
           C 288 82, 284 130, 244 157
           C 204 184, 200 230, 235 265 Z"
        fill="#4a6741"/>

  <!-- Cup body -->
  <path d="M 175 310 Q 170 295 185 290 L 315 290 Q 330 295 325 310 L 318 340 Q 316 355 300 358 L 200 358 Q 184 355 182 340 Z"
        fill="#4a6741"/>

  <!-- Cup handle -->
  <path d="M 315 300 Q 355 300 355 320 Q 355 345 315 345"
        stroke="#4a6741" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Saucer -->
  <ellipse cx="250" cy="360" rx="88" ry="12" fill="#4a6741"/>
  <ellipse cx="250" cy="366" rx="110" ry="10" fill="#4a6741"/>

  <!-- Cup rim highlight -->
  <ellipse cx="250" cy="291" rx="65" ry="9" fill="white" opacity="0.25"/>

  <!-- OLIVA text -->
  <text x="250" y="450"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="72"
        font-weight="600"
        fill="#4a6741"
        letter-spacing="18">OLIVA</text>

  <!-- Left line -->
  <line x1="55" y1="480" x2="148" y2="480" stroke="#4a6741" stroke-width="1.5"/>
  <!-- FROM COURT TO CUP -->
  <text x="250" y="485"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="16"
        fill="#4a6741"
        letter-spacing="4">FROM COURT TO CUP</text>
  <!-- Right line -->
  <line x1="352" y1="480" x2="445" y2="480" stroke="#4a6741" stroke-width="1.5"/>
</svg>